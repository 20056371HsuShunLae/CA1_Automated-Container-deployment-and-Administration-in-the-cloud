name: Build and Deploy Flask Application

on:
  push:
    branches:
      - main  # Trigger on push to main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -t simple-web-app:latest .
    
    - name: Save Docker image as .tar
      run: |
        docker save -o webapp.tar simple-web-app:latest

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v3
      with:
        name: webapp-tar
        path: webapp.tar

  deploy:
    runs-on: ubuntu-latest
    needs: build  # Ensure the build job is completed before deployment

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Download Docker image artifact
      uses: actions/download-artifact@v2
      with:
        name: webapp-tar

    - name: Set up SSH connection
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        port: 22

    - name: Load Docker image on EC2
      run: |
        docker load -i webapp.tar
    
    - name: Deploy container on EC2
      run: |
        docker stop my-web-app || true
        docker rm my-web-app || true
        docker run -d -p 80:80 --name my-web-app simple-web-app:latest
