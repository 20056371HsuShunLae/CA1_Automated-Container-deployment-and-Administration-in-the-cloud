name: Build and Deploy Flask Application

on:
  push:
    branches:
      - main  # Trigger on push to main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/app:latest Ansible/Docker_App_Ansible/
        docker push ${{ secrets.DOCKER_USERNAME }}/app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build  # Ensure the build job is completed before deployment

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up SSH connection
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        port: 22

    - name: Load Docker image on EC2
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/app:latest
    
    - name: Deploy container on EC2
      run: |
        docker stop my-web-app || true
        docker rm my-web-app || true
        docker run -d -p 80:80 --name my-web-app simple-web-app:latest
