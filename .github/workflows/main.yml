name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main  # Trigger the workflow when pushing to the main branch

jobs:
  build:
    runs-on: ubuntu-latest  # Use the hosted Ubuntu runner

    steps:
    - name: Checkout code
      uses: actions/checkout@v2  # Check out the repository code

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1  # Set up Docker Buildx for multi-platform builds
     
    - name: Log in to DockerHub
      uses: docker/login-action@v2  # Log in to DockerHub or other registries
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t simple-web-app:latest .  # Build the image

    - name: Save Docker image as tar file
      run: |
        docker save -o webapp.tar simple-web-app:latest  # Save Docker image to tar

    - name: Upload Docker image tar as artifact
      uses: actions/upload-artifact@v4  # Use the latest v4 version of upload-artifact
      with:
        name: webapp-tar
        path: webapp.tar  # Upload the Docker image as an artifact for later use

  deploy:
    runs-on: ubuntu-latest  # Use the hosted Ubuntu runner for deployment

    needs: build  # This job depends on the 'build' job

    steps:
    - name: Download Docker image tar artifact
      uses: actions/download-artifact@v4  # Use the latest v4 version of download-artifact
      with:
        name: webapp-tar  # Download the artifact from the previous job
        path: ./  # Download to current directory

    - name: Set up SSH key
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}  # Set up SSH key to connect to EC2

    - name: Deploy Docker image to EC2
      run: |
        # SSH commands to load the Docker image, stop the old container, and run the new container
        ssh -o StrictHostKeyChecking=no -i ${{ secrets.EC2_SSH_PRIVATE_KEY }} ec2-user@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          docker load -i webapp.tar  # Load the Docker image into EC2 instance
          docker stop my-web-app || true  # Stop old container if it exists
          docker rm my-web-app || true  # Remove old container
          docker run -d -p 80:80 --name my-web-app simple-web-app:latest  # Run new container
        EOF
